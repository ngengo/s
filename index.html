<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Now Playing</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome for the Spotify Icon -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Playfair Display for aesthetic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        /* SVG Film Grain */
        .grain {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Ultra-premium glassmorphism card */
        .glass-panel {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.02));
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* Slow, dreamy orb movement */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob {
            animation: blob 12s infinite ease-in-out;
        }
        .animation-delay-2000 {
            animation-delay: 2s;
        }
        .animation-delay-4000 {
            animation-delay: 4s;
        }

        /* Minimalist equalizer */
        @keyframes eq {
            0%, 100% { transform: scaleY(0.2); }
            50% { transform: scaleY(1); }
        }
        .bar {
            transform-origin: bottom;
            animation: eq 1s ease-in-out infinite;
        }
        .bar:nth-child(1) { animation-duration: 1.2s; }
        .bar:nth-child(2) { animation-duration: 0.8s; }
        .bar:nth-child(3) { animation-duration: 1.1s; }
        .bar:nth-child(4) { animation-duration: 0.9s; }
        .bar:nth-child(5) { animation-duration: 1.3s; }
    </style>
</head>
<body class="min-h-screen bg-[#050505] flex items-center justify-center sm:p-8 font-sans text-white antialiased overflow-hidden selection:bg-fuchsia-500 selection:text-white">

    <!-- Film Grain Overlay -->
    <div class="fixed inset-0 z-50 pointer-events-none grain opacity-20"></div>

    <!-- Ambient Glowing Orbs -->
    <div class="fixed top-[-10%] left-[-10%] w-[70vw] h-[70vw] max-w-[600px] max-h-[600px] rounded-full bg-fuchsia-600/40 mix-blend-screen blur-[80px] sm:blur-[120px] animate-blob"></div>
    <div class="fixed top-[40%] right-[-10%] w-[60vw] h-[60vw] max-w-[500px] max-h-[500px] rounded-full bg-violet-600/40 mix-blend-screen blur-[80px] sm:blur-[120px] animate-blob animation-delay-2000"></div>
    <div class="fixed bottom-[-20%] left-[10%] w-[80vw] h-[80vw] max-w-[700px] max-h-[700px] rounded-full bg-cyan-600/30 mix-blend-screen blur-[80px] sm:blur-[120px] animate-blob animation-delay-4000"></div>

    <!-- IG Story Framer (Simulates phone screen on desktop, full screen on mobile) -->
    <div class="relative z-10 w-full h-[100dvh] sm:h-[850px] sm:w-[420px] sm:rounded-[2.5rem] sm:border-[6px] border-white/10 shadow-[0_0_100px_rgba(0,0,0,0.6)] flex flex-col justify-between p-8 bg-black/20 backdrop-blur-2xl overflow-hidden transition-transform duration-700 hover:scale-[1.01]">
        
        <!-- Story Header Elements -->
        <div class="flex justify-between items-center w-full opacity-80 z-20">
            <div class="text-[10px] font-semibold tracking-[0.3em] uppercase text-white/90">Now Playing</div>
            <i class="fab fa-spotify text-xl drop-shadow-[0_0_8px_rgba(255,255,255,0.5)]"></i>
        </div>

        <!-- Center Focus Area -->
        <div class="w-full flex flex-col items-center z-20">
            <!-- Decorative Aesthetic Quote -->
            <h2 class="text-4xl font-serif text-white/95 mb-10 text-center drop-shadow-lg" style="font-family: 'Playfair Display', serif;">
                late night<br>sessions.
            </h2>
            
            <!-- Ultimate Glass Wrapper for Iframe -->
            <div class="glass-panel rounded-[2rem] p-4 w-full relative group">
                <!-- Inner glow effect on hover -->
                <div class="absolute inset-0 rounded-[2rem] bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
                
                <!-- The Provided Spotify Iframe -->
                <div class="rounded-[1.25rem] overflow-hidden bg-black/40 shadow-inner relative z-10">
                    <iframe 
                        data-testid="embed-iframe" 
                        style="border-radius:16px; display: block;" 
                        src="https://open.spotify.com/embed/track/0eKWGmlJmV0F0Do5KJ4Rs1?utm_source=generator&theme=0" 
                        width="100%" 
                        height="152" 
                        frameBorder="0" 
                        allowfullscreen="" 
                        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                        loading="lazy">
                    </iframe>
                </div>
            </div>
            
            <!-- Animated Aesthetic Equalizer -->
            <div class="mt-12 flex items-end space-x-2 h-8 opacity-60 mix-blend-overlay">
                <div class="bar w-1.5 h-6 bg-white rounded-full"></div>
                <div class="bar w-1.5 h-4 bg-white rounded-full"></div>
                <div class="bar w-1.5 h-8 bg-white rounded-full"></div>
                <div class="bar w-1.5 h-5 bg-white rounded-full"></div>
                <div class="bar w-1.5 h-7 bg-white rounded-full"></div>
            </div>
        </div>

        <!-- Story Footer Elements -->
        <div class="flex justify-center w-full opacity-50 z-20">
            <div class="flex items-center space-x-2">
                <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                <p class="text-[9px] tracking-[0.25em] uppercase">Screenshot to share</p>
            </div>
        </div>
    </div>
</body>
</html>
